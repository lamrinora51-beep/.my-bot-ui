<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { background: #2d2d2d; padding: 20px; border-radius: 15px; border: 2px solid #0088cc; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #0088cc; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🏰 إعدادات القلعة</h3>
        <input type="number" id="lvl" placeholder="المستوى">
        <input type="text" id="loc" placeholder="الإحداثيات">
        <button onclick="send()">حفظ وإرسال ✅</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function send() {
            let data = {
                lvl: document.getElementById('lvl').value,
                loc: document.getElementById('loc').value
            };
            // السطر الأهم لإرسال البيانات للبوت
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
