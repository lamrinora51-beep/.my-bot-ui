<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { margin-top: 20px; }
        hr { width: 100%; border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .btn { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; background-color: #24a1de; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>مرحباً، موح</h2>
    <hr>
    <button class="btn" onclick="window.Telegram.WebApp.showAlert('جاري فتح تعديل القلعة...')">تعديل قلعة</button>
    <button class="btn" onclick="window.Telegram.WebApp.showAlert('إعدادات اللغة قريباً')">إعدادات اللغة</button>
    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
