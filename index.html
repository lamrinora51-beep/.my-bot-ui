<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إعدادات القلعة - Mido Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color, #f0f2f5); color: var(--tg-theme-text-color, #222); padding: 15px; }
        .card { background: var(--tg-theme-secondary-bg-color, #fff); border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .btn-save { width: 100%; padding: 15px; border: none; border-radius: 10px; background-color: #00668b; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🏰 إعدادات القلعة</h3>
        <label>مستوى القلعة:</label>
        <input type="number" id="lvl" placeholder="مثلاً: 25">
        <label>الإحداثيات:</label>
        <input type="text" id="loc" placeholder="X, Y">
        <button class="btn-save" onclick="saveData()">حفظ وإرسال</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        function saveData() {
            let data = {
                level: document.getElementById('lvl').value,
                coords: document.getElementById('loc').value
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
