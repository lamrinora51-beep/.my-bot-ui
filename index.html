<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم البوت | Dashboard</title>
    
    <script>
        (function() {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect != location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .status-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #38bdf8;
        }
        .online-dot {
            height: 12px;
            width: 12px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }
        .btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            margin-top: 15px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="status-card">
        <h2>حالة البوت: متصل <span class="online-dot"></span></h2>
        <p>تم تكوين الملف لمنع أخطاء 404 بنجاح.</p>
        <a href="https://t.me/Mido_100_bot" class="btn">فتح البوت في تليجرام</a>
    </div>

    <script src="script.js"></script>

</body>
</html> h
