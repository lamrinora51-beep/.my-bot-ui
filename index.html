<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم موه</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f0f2f5);
            color: var(--tg-theme-text-color, #222);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 20px; }
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 12px; padding: 15px; margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select {
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid #ccc; box-sizing: border-box;
            background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color);
        }
        .btn-main {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .status { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>⚙️ إعدادات التحكم</h2>
            <p>مرحباً بك في لوحة تحكم البوت</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>معرف الحساب (ID)</label>
                <input type="text" id="user_id" placeholder="أدخل المعرف هنا...">
            </div>
            <div class="input-group">
                <label>نوع المهمة</label>
                <select id="task_type">
                    <option value="auto">تلقائي</option>
                    <option value="manual">يدوي</option>
                    <option value="collect">جمع الموارد</option>
                </select>
            </div>
        </div>

        <button class="btn-main" onclick="sendData()">حفظ الإعدادات</button>
        <p class="status">سيتم إرسال البيانات فوراً إلى البوت</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // لفتح الواجهة بكامل الشاشة

        function sendData() {
            let data = {
                id: document.getElementById('user_id').value,
                task: document.getElementById('task_type').value
            };
            tg.sendData(JSON.stringify(data)); // إرسال البيانات للبوت
            tg.close(); // إغلاق الواجهة بعد الإرسال
        }
    </script>
</body>
</html>
